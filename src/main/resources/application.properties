 #  SERVER CONFIG
 # This is the central configuration file of the entire application.
# All settings like server port, file upload limits, temp folder paths,
# FFmpeg paths and logging levels are defined here in one place.
# Any class in the project can read these values using @Value annotation.
# If any path or setting needs to be changed in the future,
# we only change it here and it reflects across the entire application
# without touching any Java code.
 

 #  APPLICATION NAME
 

 #  FILE UPLOAD CONFIG
 # By default Spring Boot does not allow large file uploads.
# These settings enable multipart file upload and increase the limit
# to 500MB so users can upload large video files without getting errors.
 

 #  TEMP FOLDER PATHS
# temp/input    temporarily save uploaded video here
#                so FFmpeg can READ it
#
#temp/output   FFmpeg saves processed video here
#                so we can SEND it back to user
 

 #  FFMPEG CONFIG (Windows)
 
# FFmpeg is a command line tool that works with real files on disk.
# It cannot process files stored in memory so we need two temp folders.
# input-dir is where uploaded video files are saved temporarily so FFmpeg can read them.
# output-dir is where FFmpeg saves the processed files so we can send them back to user.
# These folders are automatically created on startup by createTempFolders() method.
 

 #  LOGGING
 # Logging helps us see what is happening inside the application while it is running.
# Without logging we cannot debug errors or see if FFmpeg is executing correctly.
# com.videoprocessor=DEBUG shows all messages from our own code like FFmpeg commands and exit codes.
# org.springframework.web=INFO shows important messages from Spring Boot like server startup and errors.
 # Server
server.port=8080

spring.application.name=video-processing-backend

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Temp Folders
app.temp.input-dir=temp/input
app.temp.output-dir=temp/output

# FFmpeg paths \u2014 Linux paths for Render server
app.ffmpeg.path=/usr/local/bin/ffmpeg
app.ffprobe.path=/usr/local/bin/ffprobe

# Logging
logging.level.com.videoprocessor=DEBUG
logging.level.org.springframework.web=INFO